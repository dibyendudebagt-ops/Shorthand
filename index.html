<!DOCTYPE html>
<html>
<head>
  <title>Pitman Image Recognition</title>
  <style>
    body { text-align:center; font-family:Arial; }
    canvas { border:2px solid black; touch-action:none; }
  </style>
</head>
<body>

<h2>Draw Shorthand → Recognize</h2>

<canvas id="canvas" width="200" height="200"></canvas><br>

<button onclick="clearCanvas()">Clear</button>
<button onclick="recognize()">Recognize</button>

<h3 id="result"></h3>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;

// -------- DRAW --------
canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", end);

canvas.addEventListener("touchstart", e=>start(e.touches[0]));
canvas.addEventListener("touchmove", e=>{
  e.preventDefault();
  draw(e.touches[0]);
});
canvas.addEventListener("touchend", end);

function start(e){
  drawing=true;
  ctx.beginPath();

  let r = canvas.getBoundingClientRect();
  ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
}

function draw(e){
  if(!drawing) return;

  let r = canvas.getBoundingClientRect();
  ctx.lineWidth=5;
  ctx.lineCap="round";
  ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
  ctx.stroke();
}

function end(){ drawing=false; }

function clearCanvas(){
  ctx.clearRect(0,0,200,200);
}

// -------- DATASET --------
const dataset = [
  {name:"P", img:"images/P.png"},
  {name:"T", img:"images/T.png"},
  {name:"K", img:"images/K.png"},
  {name:"M", img:"images/M.png"},
  {name:"S", img:"images/S.png"}
];

// -------- IMAGE COMPARISON --------
function getCanvasData(c){
  let temp = document.createElement("canvas");
  temp.width = 50;
  temp.height = 50;

  let tctx = temp.getContext("2d");
  tctx.drawImage(c,0,0,50,50);

  return tctx.getImageData(0,0,50,50).data;
}

function loadImageData(src){
  return new Promise(resolve=>{
    let img = new Image();
    img.src = src;

    img.onload = () => {
      let temp = document.createElement("canvas");
      temp.width = 50;
      temp.height = 50;

      let tctx = temp.getContext("2d");
      tctx.drawImage(img,0,0,50,50);

      resolve(tctx.getImageData(0,0,50,50).data);
    };
  });
}

function compare(a,b){
  let diff = 0;

  for(let i=0;i<a.length;i+=4){
    diff += Math.abs(a[i] - b[i]); // compare red channel only
  }

  return diff;
}

// -------- RECOGNITION --------
async function recognize(){
  let userData = getCanvasData(canvas);

  let bestMatch = null;
  let bestScore = Infinity;

  for(let item of dataset){
    let data = await loadImageData(item.img);
    let score = compare(userData, data);

    if(score < bestScore){
      bestScore = score;
      bestMatch = item.name;
    }
  }

  document.getElementById("result").innerText =
    "Detected: " + bestMatch + " (score: " + bestScore + ")";
}
</script>

</body>
</html>
